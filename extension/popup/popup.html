<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Better Flow Recorder</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="logo-wrapper">
        <img src="/logo.svg" alt="Better Flow" width="22" height="22">
      </div>
      <div class="header-content">
        <h1 class="title">Better Flow</h1>
        <p class="subtitle">Studio Recorder</p>
      </div>
      <div class="version-tag">v1.2</div>
    </div>

    <div class="tabs-container">
      <button class="tab-button active" data-tab="record">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path
            d="M23 7a2 2 0 0 0-2.45-1.45L16 7V5a2 2 0 0 0-2-2H2a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2l4.55 1.45A2 2 0 0 0 23 17V7z" />
        </svg>
        <span>Video</span>
      </button>
      <button class="tab-button" data-tab="capture">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <circle cx="8.5" cy="8.5" r="1.5" />
          <path d="M21 15l-5-5L5 21" />
        </svg>
        <span>Capture</span>
      </button>
    </div>

    <div class="tab-content active" id="record-tab">
      <div class="mode-grid">
        <button id="recordTabBtn" class="mode-card active">
          <svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2" />
            <line x1="2" y1="20" x2="22" y2="20" />
          </svg>
          <span class="mode-label">Current Tab</span>
        </button>
        <button id="recordScreenBtn" class="mode-card">
          <svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="1" y="5" width="22" height="14" rx="2" />
            <line x1="1" y1="10" x2="23" y2="10" />
          </svg>
          <span class="mode-label">Entire Screen</span>
        </button>
      </div>

      <div class="settings-section" id="recordSettings">
        <div class="setting-item">
          <div class="setting-label">
            <svg class="setting-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path
                d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M6.34 17.66l2.83-2.83M14.83 9.17l2.83-2.83" />
            </svg>
            <span>Video Quality</span>
          </div>
          <select id="fpsSelect" class="select-input">
            <option value="30">30 FPS • Standard</option>
            <option value="60" selected>60 FPS • Pro Stream</option>
          </select>
        </div>
      </div>

      <div class="status-section">
        <div id="status" class="status idle">
          <span class="status-dot"></span>
          <span id="statusText">Ready engine</span>
        </div>
      </div>

      <div class="controls-section" id="controlsSection">
        <button id="startBtn" class="btn btn-primary btn-large">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="12" r="9" />
          </svg>
          Start Recording
        </button>
      </div>

      <!-- Recording Active Controls -->
      <div class="controls-section hidden" id="stopSection">
        <button id="stopBtn" class="btn btn-danger btn-large">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
            <rect x="4" y="4" width="16" height="16" rx="2" />
          </svg>
          Stop & Send to Workspace
        </button>
      </div>

      <div class="progress-section hidden" id="progressSection">
        <div class="progress-header">
          <span class="progress-label">Uploading to Better Flow CDN</span>
          <span id="progressText" class="progress-text">0%</span>
        </div>
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>

      <div class="error-container hidden" id="errorContainer">
        <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
        <p class="error-text" id="errorText"></p>
      </div>
    </div>

    <div class="tab-content" id="capture-tab">
      <div class="capture-grid">
        <button id="captureFullBtn" class="btn btn-secondary">
          <svg class="btn-icon-sec" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2" />
          </svg>
          <span>Visible Viewport</span>
        </button>
        <button id="captureFullPageBtn" class="btn btn-secondary">
          <svg class="btn-icon-sec" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M19 12l-7 7-7-7" />
          </svg>
          <span>Full Stitch Page</span>
        </button>
      </div>
    </div>

    <div class="footer">
      <p class="footer-text">Engine operational • Powered by R2 Cloud Architecture</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
